<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#fff6ec" />
		<title>GoalIQ Premium | FPL tools</title>
		<meta
			name="description"
			content="Fantasy Premier League tools from the GoalIQ match model: clean sheet probability, fixture difficulty and player expected points (xP)."
		/>
		<link rel="icon" type="image/png" href="%sveltekit.assets%/goaliq-appicon-192.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/goaliq-appicon-192.png" />
		<meta property="og:title" content="GoalIQ Premium | FPL tools" />
		<meta
			property="og:description"
			content="Clean sheet probability, fixture difficulty and player expected points from the GoalIQ match model."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://pro.goaliq.app/" />
		<!-- #155-fix: og:image OLI suhteellinen (%sveltekit.assets%) — X/FB-crawlerit
		     vaativat absoluuttisen URLin, ja twitter:card puuttui → tweet-kortti jäi
		     ilman ikonia. summary = neliökortti ikonilla. -->
		<meta property="og:image" content="https://pro.goaliq.app/goaliq-appicon-512.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="GoalIQ Premium | FPL tools" />
		<meta
			name="twitter:description"
			content="Clean sheet probability, fixture difficulty and player expected points from the GoalIQ match model."
		/>
		<meta name="twitter:image" content="https://pro.goaliq.app/goaliq-appicon-512.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
